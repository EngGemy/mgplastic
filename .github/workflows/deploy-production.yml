name: CI / Deploy Production

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mgplastic-production
  cancel-in-progress: false

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'
  DEFAULT_CPANEL_APP_PATH: /home/mgplasti/mgplastic_app
  DEFAULT_CPANEL_PUBLIC_PATH: /home/mgplasti/public_html
  SSH_CONNECT_TIMEOUT: '15'
  SSH_CONNECTION_ATTEMPTS: '3'
  SSH_SERVER_ALIVE_INTERVAL: '30'
  SSH_SERVER_ALIVE_COUNT_MAX: '6'

jobs:
  ci:
    name: CI — tests & build
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      APP_ENV: testing
      APP_DEBUG: false
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, ctype, curl, dom, fileinfo, json, mbstring, openssl, pdo, pdo_sqlite, sqlite3, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Install Composer (dev)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Validate Laravel boot
        run: |
          php artisan config:clear
          php artisan view:cache

      - name: Run tests
        run: php artisan test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

  deploy:
    name: Deploy → cPanel (mg-plastic.com)
    runs-on: ubuntu-latest
    # Composer/npm + upload need headroom; SSH fails fast via ConnectTimeout / retry timeout.
    timeout-minutes: 25
    needs: ci
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, ctype, curl, dom, fileinfo, json, mbstring, openssl, pdo, tokenizer, xml, zip
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install production dependencies
        run: |
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --no-progress
          npm ci
          npm run build

      - name: Generate public_html index.php (split deploy)
        env:
          CPANEL_APP_PATH: ${{ secrets.CPANEL_APP_PATH }}
          CPANEL_PUBLIC_PATH: ${{ secrets.CPANEL_PUBLIC_PATH }}
        run: |
          set -euo pipefail
          APP_PATH="${CPANEL_APP_PATH:-$DEFAULT_CPANEL_APP_PATH}"
          PUBLIC_PATH="${CPANEL_PUBLIC_PATH:-$DEFAULT_CPANEL_PUBLIC_PATH}"
          APP_REL="$(python3 -c "import os; print(os.path.relpath('${APP_PATH}', '${PUBLIC_PATH}'))")"
          echo "Bootstrap path: ${APP_REL}"
          sed "s|__APP_BASE__|${APP_REL}|g" deploy/templates/public-index.php.stub > public/index.php.cpanel

      - name: Validate deployment secrets
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [ -z "${CPANEL_HOST:-}" ] && missing+=("CPANEL_HOST")
          [ -z "${CPANEL_USER:-}" ] && missing+=("CPANEL_USER")
          [ -z "${CPANEL_SSH_KEY:-}" ] && missing+=("CPANEL_SSH_KEY")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing GitHub secrets: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_KEY }}

      - name: Configure SSH multiplexing + known_hosts
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
        run: |
          set -euo pipefail
          PORT="${CPANEL_PORT:-22}"
          mkdir -p ~/.ssh/cm
          chmod 700 ~/.ssh ~/.ssh/cm

          # ControlMaster: all later ssh/scp share one TCP session (avoids MaxStartups / fail2ban)
          {
            echo "Host cpanel-deploy"
            echo "  HostName ${CPANEL_HOST}"
            echo "  User ${CPANEL_USER}"
            echo "  Port ${PORT}"
            echo "  BatchMode yes"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking accept-new"
            echo "  ConnectTimeout ${SSH_CONNECT_TIMEOUT}"
            echo "  ConnectionAttempts ${SSH_CONNECTION_ATTEMPTS}"
            echo "  ServerAliveInterval ${SSH_SERVER_ALIVE_INTERVAL}"
            echo "  ServerAliveCountMax ${SSH_SERVER_ALIVE_COUNT_MAX}"
            echo "  ControlMaster auto"
            echo "  ControlPath ~/.ssh/cm/%r@%h:%p"
            echo "  ControlPersist 10m"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

          for i in 1 2 3 4 5; do
            if ssh-keyscan -p "${PORT}" -T 15 -H "${CPANEL_HOST}" >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "known_hosts updated (attempt ${i})"
              break
            fi
            echo "ssh-keyscan failed (attempt ${i}); retrying in 5s..."
            sleep 5
            if [ "$i" -eq 5 ]; then
              echo "::error::Could not fetch host key from ${CPANEL_HOST}:${PORT}"
              exit 1
            fi
          done

      - name: Pre-flight connectivity check
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
        run: |
          set -euo pipefail
          PORT="${CPANEL_PORT:-22}"
          echo "Checking TCP ${CPANEL_HOST}:${PORT}..."
          if ! nc -zv -w 10 "${CPANEL_HOST}" "${PORT}"; then
            echo "::error::Host ${CPANEL_HOST}:${PORT} is unreachable (nc failed). Check firewall / fail2ban / SSH daemon."
            exit 1
          fi
          echo "Opening ControlMaster SSH session..."
          if ! ssh -o ConnectTimeout=15 cpanel-deploy 'echo ok && uname -a'; then
            echo "::error::SSH auth/probe failed for ${CPANEL_HOST}:${PORT}."
            echo "Check: authorized_keys, CPANEL_SSH_KEY, CSF/firewall allowlist for GitHub Actions."
            exit 255
          fi

      - name: Deploy over SSH (retry)
        uses: nick-fields/retry@v3
        env:
          CPANEL_APP_PATH: ${{ secrets.CPANEL_APP_PATH }}
          CPANEL_PUBLIC_PATH: ${{ secrets.CPANEL_PUBLIC_PATH }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            set -euo pipefail
            APP_PATH="${CPANEL_APP_PATH:-$DEFAULT_CPANEL_APP_PATH}"
            PUBLIC_PATH="${CPANEL_PUBLIC_PATH:-$DEFAULT_CPANEL_PUBLIC_PATH}"

            # Ensure ControlMaster is alive (cheap if already up)
            ssh -O check cpanel-deploy 2>/dev/null || ssh -fN cpanel-deploy

            echo "==> Ensure remote directories"
            ssh cpanel-deploy "mkdir -p '${APP_PATH}' '${PUBLIC_PATH}' '${APP_PATH}/storage' '${APP_PATH}/bootstrap/cache'"

            echo "==> Deploy application (with vendor)"
            tar --exclude='.git' \
                --exclude='node_modules' \
                --exclude='.env' \
                --exclude='storage/framework/cache' \
                --exclude='storage/framework/sessions' \
                --exclude='storage/framework/views' \
                --exclude='storage/logs' \
                --exclude='public' \
                --exclude='tests' \
                -czf - . | ssh cpanel-deploy "tar -xzf - -C '${APP_PATH}'"

            echo "==> Deploy public assets"
            tar --exclude='storage/' -czf - -C public . | ssh cpanel-deploy "tar -xzf - -C '${PUBLIC_PATH}'"

            echo "==> Deploy bootstrap index.php"
            scp public/index.php.cpanel "cpanel-deploy:${PUBLIC_PATH}/index.php"

            echo "==> Post-deploy (stream script on multiplexed SSH — no extra scp handshake)"
            ssh cpanel-deploy "cat > /tmp/mgplastic-post-deploy.sh && bash /tmp/mgplastic-post-deploy.sh '${APP_PATH}' '${PUBLIC_PATH}' && rm -f /tmp/mgplastic-post-deploy.sh" \
              < deploy/scripts/post-deploy.sh

      - name: Close SSH ControlMaster
        if: always()
        run: ssh -O exit cpanel-deploy 2>/dev/null || true
